# Koyeb Deployment Configuration
# https://www.koyeb.com/docs/build-and-deploy/app-spec

name: football-predictions
type: web

# Build from Dockerfile
build:
  dockerfile:
    dockerfile: Dockerfile

# Service configuration
service:
  name: football-predictions
  regions:
    - fra # Frankfurt (free tier)

  # Instance configuration (free tier)
  instance_types:
    - type: free

  # Scaling
  scaling:
    min: 1
    max: 1

  # Port
  ports:
    - port: 8000
      protocol: http

  # Health check
  health_checks:
    - path: /
      port: 8000
      protocol: http
      interval_seconds: 30
      timeout_seconds: 5
      healthy_threshold: 2
      unhealthy_threshold: 3

  # Environment variables (set these in Koyeb dashboard)
  env:
    - key: FOOTBALL_DATA_API_KEY
      value: ""
      secret: true
    - key: THE_ODDS_API_KEY
      value: ""
      secret: true
    - key: API_FOOTBALL_KEY
      value: ""
      secret: true
    - key: TELEGRAM_BOT_TOKEN
      value: ""
      secret: true
    - key: FLASK_ENV
      value: "production"
