<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet Tracker | Football Predictions</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/design-system.css">
    <link rel="stylesheet" href="/static/css/premium-ui.css">
    
    <style>
        .tracker-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .page-header h1 { font-size: 2rem; }
        .page-header p { color: #a0a0a0; }
        
        .add-bet-card {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 6px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #6366f1;
        }
        
        .btn-add {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
        }
        
        .pending-bets h2 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .pending-count {
            background: #f59e0b;
            color: #000;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
        }
        
        .bet-card {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .bet-details {
            flex: 1;
        }
        
        .bet-match {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .bet-selection {
            color: #10b981;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        
        .bet-meta {
            display: flex;
            gap: 15px;
            color: #a0a0a0;
            font-size: 0.85rem;
        }
        
        .bet-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-won, .btn-lost {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-won {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .btn-won:hover { background: #10b981; color: white; }
        
        .btn-lost {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .btn-lost:hover { background: #ef4444; color: white; }
        
        .history-section {
            margin-top: 40px;
        }
        
        .history-section h2 {
            margin-bottom: 20px;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(26, 26, 46, 0.6);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .history-result {
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .history-result.won {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .history-result.lost {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .profit-display {
            font-weight: 600;
        }
        
        .profit-display.positive { color: #10b981; }
        .profit-display.negative { color: #ef4444; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }
        
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .quick-stat {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .quick-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .quick-stat-label {
            color: #a0a0a0;
            font-size: 0.8rem;
            margin-top: 4px;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #a0a0a0;
            text-decoration: none;
        }
        
        .back-link:hover { color: #fff; }
        
        .login-prompt {
            text-align: center;
            padding: 60px 20px;
            background: rgba(26, 26, 46, 0.6);
            border-radius: 16px;
        }
        
        .login-prompt h2 { margin-bottom: 15px; }
        .login-prompt p { color: #a0a0a0; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="tracker-container">
        <a href="/" class="back-link">← Back to Predictions</a>
        
        <div class="page-header">
            <h1>📊 Bet Tracker</h1>
            <p>Track your bets and analyze your performance</p>
        </div>
        
        <div id="content">
            <!-- Content loaded via JS -->
        </div>
    </div>
    
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        
        if (!token || !user) {
            document.getElementById('content').innerHTML = `
                <div class="login-prompt">
                    <h2>🔐 Login Required</h2>
                    <p>Please login to track your bets</p>
                    <a href="/login" class="btn btn-primary">Login</a>
                </div>
            `;
        } else {
            renderTracker();
        }
        
        function renderTracker() {
            document.getElementById('content').innerHTML = `
                <div class="quick-stats">
                    <div class="quick-stat">
                        <div class="quick-stat-value" id="pending-stake">$0</div>
                        <div class="quick-stat-label">Pending Stakes</div>
                    </div>
                    <div class="quick-stat">
                        <div class="quick-stat-value" id="today-profit" style="color: #10b981;">$0</div>
                        <div class="quick-stat-label">Today's Profit</div>
                    </div>
                    <div class="quick-stat">
                        <div class="quick-stat-value" id="potential-return">$0</div>
                        <div class="quick-stat-label">Potential Returns</div>
                    </div>
                </div>
                
                <div class="add-bet-card">
                    <h3 style="margin-bottom: 20px;">➕ Add New Bet</h3>
                    <form id="add-bet-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Home Team</label>
                                <input type="text" class="form-input" name="home_team" placeholder="e.g. Bayern Munich" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Away Team</label>
                                <input type="text" class="form-input" name="away_team" placeholder="e.g. Dortmund" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Selection</label>
                            <input type="text" class="form-input" name="selection" placeholder="e.g. Bayern Win, Over 2.5, BTTS" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Odds</label>
                                <input type="number" step="0.01" class="form-input" name="odds" placeholder="1.85" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Stake ($)</label>
                                <input type="number" step="0.01" class="form-input" name="stake" placeholder="10.00" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-add">Add Bet</button>
                    </form>
                </div>
                
                <div class="pending-bets">
                    <h2>⏳ Pending Bets <span class="pending-count" id="pending-count">0</span></h2>
                    <div id="pending-list"></div>
                </div>
                
                <div class="history-section">
                    <h2>📜 Recent Settled Bets</h2>
                    <div id="history-list"></div>
                </div>
            `;
            
            document.getElementById('add-bet-form').addEventListener('submit', addBet);
            loadBets();
        }
        
        async function loadBets() {
            try {
                const res = await fetch('/api/bets', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (data.success) {
                    const pending = data.bets.filter(b => b.status === 'pending');
                    const settled = data.bets.filter(b => b.status !== 'pending');
                    
                    document.getElementById('pending-count').textContent = pending.length;
                    
                    // Update quick stats
                    const pendingStake = pending.reduce((sum, b) => sum + b.stake, 0);
                    const potentialReturn = pending.reduce((sum, b) => sum + (b.stake * b.odds), 0);
                    document.getElementById('pending-stake').textContent = '$' + pendingStake.toFixed(2);
                    document.getElementById('potential-return').textContent = '$' + potentialReturn.toFixed(2);
                    
                    // Render pending bets
                    if (pending.length > 0) {
                        document.getElementById('pending-list').innerHTML = pending.map(bet => `
                            <div class="bet-card">
                                <div class="bet-details">
                                    <div class="bet-match">${bet.home_team} vs ${bet.away_team}</div>
                                    <div class="bet-selection">${bet.selection}</div>
                                    <div class="bet-meta">
                                        <span>Odds: ${bet.odds.toFixed(2)}</span>
                                        <span>Stake: $${bet.stake}</span>
                                        <span>Return: $${(bet.stake * bet.odds).toFixed(2)}</span>
                                    </div>
                                </div>
                                <div class="bet-actions">
                                    <button class="btn-won" onclick="settleBet('${bet.id}', true)">✓ Won</button>
                                    <button class="btn-lost" onclick="settleBet('${bet.id}', false)">✗ Lost</button>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        document.getElementById('pending-list').innerHTML = `
                            <div class="empty-state">No pending bets</div>
                        `;
                    }
                    
                    // Render history
                    if (settled.length > 0) {
                        document.getElementById('history-list').innerHTML = settled.slice(0, 10).map(bet => `
                            <div class="history-item">
                                <div>
                                    <div style="font-weight: 500;">${bet.home_team} vs ${bet.away_team}</div>
                                    <div style="color: #a0a0a0; font-size: 0.85rem;">${bet.selection} @ ${bet.odds.toFixed(2)}</div>
                                </div>
                                <div style="text-align: right;">
                                    <div class="profit-display ${bet.profit_loss >= 0 ? 'positive' : 'negative'}">
                                        ${bet.profit_loss >= 0 ? '+' : ''}$${bet.profit_loss.toFixed(2)}
                                    </div>
                                    <span class="history-result ${bet.status}">${bet.status.toUpperCase()}</span>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        document.getElementById('history-list').innerHTML = `
                            <div class="empty-state">No settled bets yet</div>
                        `;
                    }
                }
            } catch (err) {
                console.error('Failed to load bets:', err);
            }
        }
        
        async function addBet(e) {
            e.preventDefault();
            const form = e.target;
            
            const data = {
                home_team: form.home_team.value,
                away_team: form.away_team.value,
                selection: form.selection.value,
                odds: parseFloat(form.odds.value),
                stake: parseFloat(form.stake.value)
            };
            
            try {
                const res = await fetch('/api/bets', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                if (result.success) {
                    form.reset();
                    loadBets();
                } else {
                    alert(result.error || 'Failed to add bet');
                }
            } catch (err) {
                alert('Network error');
            }
        }
        
        async function settleBet(betId, won) {
            try {
                const res = await fetch(`/api/bets/${betId}/settle`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ won })
                });
                
                const result = await res.json();
                
                if (result.success) {
                    loadBets();
                } else {
                    alert(result.error || 'Failed to settle bet');
                }
            } catch (err) {
                alert('Network error');
            }
        }
    </script>
</body>
</html>
