<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | Football Predictions</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/design-system.css">
    <link rel="stylesheet" href="/static/css/premium-ui.css">
    
    <style>
        .leaderboard-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .page-header h1 { font-size: 2rem; }
        .page-header p { color: #a0a0a0; }
        
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .podium-spot {
            text-align: center;
        }
        
        .podium-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 10px;
        }
        
        .podium-name {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .podium-profit {
            color: #10b981;
            font-weight: 700;
        }
        
        .podium-base {
            width: 100px;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            margin-top: 10px;
        }
        
        .first .podium-avatar {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            width: 80px;
            height: 80px;
            font-size: 2rem;
        }
        
        .first .podium-base {
            height: 120px;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000;
        }
        
        .second .podium-avatar {
            background: linear-gradient(135deg, #9ca3af, #d1d5db);
        }
        
        .second .podium-base {
            height: 90px;
            background: linear-gradient(135deg, #9ca3af, #d1d5db);
            color: #000;
        }
        
        .third .podium-avatar {
            background: linear-gradient(135deg, #b45309, #d97706);
        }
        
        .third .podium-base {
            height: 70px;
            background: linear-gradient(135deg, #b45309, #d97706);
            color: #000;
        }
        
        .leaderboard-table {
            background: rgba(26, 26, 46, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 60px 1fr 100px 100px 100px;
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            font-weight: 600;
            color: #a0a0a0;
            font-size: 0.85rem;
        }
        
        .table-row {
            display: grid;
            grid-template-columns: 60px 1fr 100px 100px 100px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            align-items: center;
        }
        
        .table-row:hover {
            background: rgba(99, 102, 241, 0.1);
        }
        
        .table-row:last-child { border-bottom: none; }
        
        .rank {
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .rank.gold { color: #f59e0b; }
        .rank.silver { color: #9ca3af; }
        .rank.bronze { color: #d97706; }
        
        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .mini-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }
        
        .profit-cell {
            color: #10b981;
            font-weight: 600;
        }
        
        .stat-cell {
            color: #a0a0a0;
        }
        
        .your-rank {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid #6366f1;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a0;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #a0a0a0;
            text-decoration: none;
        }
        
        .back-link:hover { color: #fff; }
        
        @media (max-width: 600px) {
            .podium { flex-direction: column; align-items: center; }
            .table-header, .table-row {
                grid-template-columns: 40px 1fr 80px;
            }
            .table-header > *:nth-child(4),
            .table-header > *:nth-child(5),
            .table-row > *:nth-child(4),
            .table-row > *:nth-child(5) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="leaderboard-container">
        <a href="/" class="back-link">← Back to Predictions</a>
        
        <div class="page-header">
            <h1>🏆 Leaderboard</h1>
            <p>Top bettors ranked by profit</p>
        </div>
        
        <div class="podium" id="podium">
            <!-- Podium loaded via JS -->
        </div>
        
        <div class="leaderboard-table">
            <div class="table-header">
                <span>Rank</span>
                <span>User</span>
                <span>Profit</span>
                <span>Win Rate</span>
                <span>Bets</span>
            </div>
            <div id="table-body">
                <div class="empty-state">
                    <p>Loading leaderboard...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const currentUser = JSON.parse(localStorage.getItem('user') || 'null');
        
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();
                
                if (data.success && data.leaderboard.length > 0) {
                    renderPodium(data.leaderboard.slice(0, 3));
                    renderTable(data.leaderboard);
                } else {
                    document.getElementById('podium').innerHTML = '';
                    document.getElementById('table-body').innerHTML = `
                        <div class="empty-state">
                            <h3>No rankings yet</h3>
                            <p>Complete at least 5 bets to appear on the leaderboard</p>
                        </div>
                    `;
                }
            } catch (err) {
                console.error('Failed to load leaderboard:', err);
            }
        }
        
        function renderPodium(top3) {
            const positions = ['second', 'first', 'third'];
            const medals = ['🥈', '🥇', '🥉'];
            const order = [1, 0, 2]; // Display order: 2nd, 1st, 3rd
            
            let html = '';
            order.forEach((idx, displayIdx) => {
                if (top3[idx]) {
                    const user = top3[idx];
                    html += `
                        <div class="podium-spot ${positions[displayIdx]}">
                            <div class="podium-avatar">${user.user_id[0].toUpperCase()}</div>
                            <div class="podium-name">${user.user_id}</div>
                            <div class="podium-profit">+$${user.profit.toFixed(0)}</div>
                            <div class="podium-base">${medals[displayIdx]}</div>
                        </div>
                    `;
                }
            });
            
            document.getElementById('podium').innerHTML = html;
        }
        
        function renderTable(leaders) {
            const rankClasses = ['gold', 'silver', 'bronze'];
            
            document.getElementById('table-body').innerHTML = leaders.map((user, idx) => {
                const isYou = currentUser && user.user_id === currentUser.id;
                return `
                    <div class="table-row ${isYou ? 'your-rank' : ''}">
                        <span class="rank ${rankClasses[idx] || ''}">#${user.rank}</span>
                        <div class="user-cell">
                            <div class="mini-avatar">${user.user_id[0].toUpperCase()}</div>
                            <span>${user.user_id}${isYou ? ' (You)' : ''}</span>
                        </div>
                        <span class="profit-cell">+$${user.profit.toFixed(2)}</span>
                        <span class="stat-cell">${user.win_rate}%</span>
                        <span class="stat-cell">${user.total_bets}</span>
                    </div>
                `;
            }).join('');
        }
        
        loadLeaderboard();
    </script>
</body>
</html>
