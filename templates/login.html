<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FootyPredict Pro</title>
    
    <meta name="theme-color" content="#6366f1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #050510;
            --accent: #6366f1;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
        }
        
        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --text: #0f172a;
            --text-muted: #64748b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            background-image: radial-gradient(ellipse at top, rgba(99, 102, 241, 0.2) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        [data-theme="light"] body {
            background-image: radial-gradient(ellipse at top, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
        }
        
        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(20, 20, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
        }
        
        [data-theme="light"] .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(0, 0, 0, 0.1);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 16px;
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.4);
        }
        
        .logo-title {
            font-size: 1.8rem;
            font-weight: 800;
        }
        
        .logo-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.2s;
        }
        
        [data-theme="light"] .form-input {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.1);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }
        
        .form-input::placeholder {
            color: var(--text-muted);
        }
        
        .forgot-link {
            display: block;
            text-align: right;
            color: var(--accent);
            font-size: 0.85rem;
            text-decoration: none;
            margin-top: 8px;
        }
        
        .forgot-link:hover { text-decoration: underline; }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
            margin-top: 24px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.5);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider span { padding: 0 16px; }
        
        .social-btns {
            display: flex;
            gap: 12px;
        }
        
        .btn-social {
            flex: 1;
            padding: 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        [data-theme="light"] .btn-social {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.1);
        }
        
        .btn-social:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3);
        }
        
        .signup-link {
            text-align: center;
            margin-top: 28px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        
        .signup-link a:hover { text-decoration: underline; }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-decoration: none;
        }
        
        .back-link:hover { color: var(--text); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">⚽</div>
                <h1 class="logo-title">FootyPredict Pro</h1>
                <p class="logo-subtitle">Sign in to your account</p>
            </div>
            
            <form action="/api/login" method="POST">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            
            <div class="divider"><span>or continue with</span></div>
            
            <div class="social-btns">
                <button class="btn-social" title="Google">🔵</button>
                <button class="btn-social" title="GitHub">⬛</button>
                <button class="btn-social" title="Telegram">💬</button>
            </div>
            
            <p class="signup-link">
                Don't have an account? <a href="/pricing">Sign up</a>
            </p>
        </div>
        
        <a href="/" class="back-link">← Back to Home</a>
    </div>
    
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</body>
</html>
