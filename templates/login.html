<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Football Predictions</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/design-system.css">
    
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1a3e 100%);
        }
        
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }
        
        .auth-logo {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
        }
        
        .auth-title {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }
        
        .auth-subtitle {
            color: var(--text-secondary);
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: var(--spacing-xl);
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 4px;
        }
        
        .auth-tab {
            flex: 1;
            padding: var(--spacing-md);
            text-align: center;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
        }
        
        .auth-tab.active {
            background: var(--accent-primary);
            color: white;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-divider {
            display: flex;
            align-items: center;
            margin: var(--spacing-lg) 0;
            color: var(--text-muted);
        }
        
        .form-divider::before,
        .form-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        
        .form-divider span {
            padding: 0 var(--spacing-md);
            font-size: var(--font-size-sm);
        }
        
        .social-login {
            display: flex;
            gap: var(--spacing-md);
        }
        
        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-md);
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .social-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-color-light);
        }
        
        .form-link {
            color: var(--accent-primary);
            text-decoration: none;
        }
        
        .form-link:hover {
            text-decoration: underline;
        }
        
        .form-remember {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }
        
        .form-remember input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-primary);
        }
        
        .alert {
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-lg);
            display: none;
        }
        
        .alert.error {
            display: block;
            background: var(--danger-bg);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        
        .alert.success {
            display: block;
            background: var(--success-bg);
            border: 1px solid var(--success);
            color: var(--success);
        }
        
        .tier-select {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }
        
        .tier-option {
            padding: var(--spacing-md);
            text-align: center;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .tier-option:hover {
            border-color: var(--accent-primary);
        }
        
        .tier-option.selected {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
        }
        
        .tier-option input {
            display: none;
        }
        
        .tier-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .tier-price {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate-slide-up">
            <div class="auth-header">
                <div class="auth-logo">⚽</div>
                <h1 class="auth-title">Football Predictions</h1>
                <p class="auth-subtitle">AI-powered match predictions</p>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showTab('login')">Login</button>
                <button class="auth-tab" onclick="showTab('register')">Register</button>
            </div>
            
            <div id="alert" class="alert"></div>
            
            <!-- Login Form -->
            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="form-remember">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                    <a href="#" class="form-link" style="margin-left: auto;">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Login
                </button>
                
                <div class="form-divider">
                    <span>or continue with</span>
                </div>
                
                <div class="social-login">
                    <button type="button" class="social-btn">
                        <span>G</span> Google
                    </button>
                    <button type="button" class="social-btn">
                        <span>📱</span> Telegram
                    </button>
                </div>
            </form>
            
            <!-- Register Form -->
            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="johndoe" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Select Plan</label>
                    <div class="tier-select">
                        <label class="tier-option selected">
                            <input type="radio" name="tier" value="free" checked>
                            <div class="tier-name">🆓 Free</div>
                            <div class="tier-price">$0/mo</div>
                        </label>
                        <label class="tier-option">
                            <input type="radio" name="tier" value="pro">
                            <div class="tier-name">⭐ Pro</div>
                            <div class="tier-price">$9.99/mo</div>
                        </label>
                        <label class="tier-option">
                            <input type="radio" name="tier" value="premium">
                            <div class="tier-name">👑 Premium</div>
                            <div class="tier-price">$24.99/mo</div>
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Create Account
                </button>
                
                <p style="text-align: center; margin-top: var(--spacing-lg); color: var(--text-secondary); font-size: var(--font-size-sm);">
                    By registering, you agree to our <a href="#" class="form-link">Terms</a> and <a href="#" class="form-link">Privacy Policy</a>
                </p>
            </form>
        </div>
    </div>
    
    <script>
        function showTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-form').classList.add('active');
            
            document.getElementById('alert').className = 'alert';
        }
        
        // Tier selection
        document.querySelectorAll('.tier-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.tier-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        
        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const data = {
                email: form.email.value,
                password: form.password.value
            };
            
            try {
                const response = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    window.location.href = '/';
                } else {
                    showAlert(result.error || 'Login failed', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            const data = {
                username: form.username.value,
                email: form.email.value,
                password: form.password.value,
                tier: form.tier.value
            };
            
            try {
                const response = await fetch('/api/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    if (data.tier !== 'free') {
                        window.location.href = '/pricing?checkout=' + data.tier;
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    showAlert(result.error || 'Registration failed', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            }
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type;
        }
    </script>
</body>
</html>
